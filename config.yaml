# ============================================================
# AI Infra 知识蒸馏 — 训练配置文件
# ============================================================
# 此文件覆盖 config.py 中 Config class 的默认值。
# 未在此文件中声明的字段将使用 Config class 中的默认值。
#
# 用法：
#   python inference.py                  （自动读取 ./config.yaml）
#   python inference.py --config prod.yaml（指定其他配置文件）
#
# 字段命名：全部使用小写 + 下划线（snake_case），
#           config.py 会自动映射到大写属性名（UPPER_CASE）。
# ============================================================

# ============================================================
# 模型
# ============================================================

# Hugging Face 模型 ID 或本地路径。
# 支持的模型系列：Qwen2.5、Llama3、Mistral 等因果语言模型。
# 0.5B 参数规模适合 8-12GB 显存的单卡微调。
model_id: "Qwen/Qwen2.5-0.5B-Instruct"

# ============================================================
# 数据
# ============================================================

# 训练数据目录（相对于项目根目录）。
# 仅支持 Parquet 格式（reasoning-distill schema）。
# JSON 数据需先转换: python json_to_parquet.py
# Parquet 列：
#   messages  : list<{role, content}>  — 对话消息（通常仅 user 角色）
#   thinking  : str                    — 推理/思考过程
#   response  : str                    — 最终回答
#   system    : str                    — 系统提示词（可选，fallback 到下方 system_prompt）
# 训练时 thinking + response 自动拼接为 assistant content，整段计算 loss。
data_dir: "./data/ai_infra_audio_video"

# ============================================================
# 路径
# ============================================================

# 模型下载缓存目录。
# 首次运行时会从 Hugging Face 下载模型到此目录（约 1GB）。
# 之后运行直接读取本地缓存，无需重复下载。
cache_dir: "./models/qwen2.5-0.5b"

# LoRA adapter 输出目录。
# 训练完成后，adapter 权重（adapter_model.safetensors，约几 MB）
# 及配置文件（adapter_config.json）将保存到此目录。
# 同时保存各 epoch 的 checkpoint 子目录。
output_dir: "./lora_sft_ai_infra_audio_video_output"

# ============================================================
# LoRA 参数（Low-Rank Adaptation）
# ============================================================
# LoRA 核心思想：不直接微调原始权重矩阵 W，而是训练低秩增量 ΔW = B·A。
# 推理时合并 W' = W + ΔW，无额外延迟。可训练参数量从 ~500M 降至 ~2M。
lora:

  # 低秩矩阵的秩（rank）。
  # r 越大，表达能力越强，但可训练参数越多、过拟合风险越高。
  # 推荐范围：8（极简）~ 64（复杂任务）。小数据集（<1000 条）建议 8~16。
  # 当前 432 条数据，r=8 可有效防止过拟合。
  r: 8

  # LoRA 缩放系数。
  # 实际缩放因子 = alpha / r。alpha=16, r=8 时缩放因子为 2。
  # 常用搭配：alpha = 2 * r。
  alpha: 16

  # LoRA 层的 dropout 概率。
  # 在低秩矩阵训练时随机丢弃部分神经元，防止小数据集上的过拟合。
  # 推荐范围：0.05~0.15。数据量越少、epoch 越多，dropout 应越高。
  dropout: 0.1

  # 要应用 LoRA 的目标模块名称列表。
  # Qwen 系列常用模块：q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj。
  # 当前仅微调 Q 和 V 投影矩阵，这是工业界经过验证的最稳定配置：
  #   - 可训练参数最少（~2M），过拟合风险最低
  #   - 指令跟随能力提升显著
  #   - 如需更强表达能力，可追加 "k_proj", "o_proj"
  target_modules: ["q_proj", "v_proj"]

# ============================================================
# 训练超参数
# ============================================================
training:

  # 每张 GPU 的 micro batch size。
  # 受显存限制：0.5B 模型 BF16 训练时，4 约占用 6-8GB 显存。
  # 显存充足可增大到 8~16 以加快训练。
  per_device_batch_size: 4

  # 梯度累积步数。
  # 等效 batch_size = per_device_batch_size × gradient_accumulation_steps
  #                = 4 × 8 = 32
  # 在显存受限时，通过累积小 batch 的梯度模拟大 batch 训练，维持训练稳定性。
  # 增大此值 → 等效 batch 变大 → 梯度估计更准确，但训练速度不变。
  gradient_accumulation_steps: 8

  # 初始学习率。
  # LoRA 微调推荐 lr 高于全量微调（全量通常 1e-5 ~ 5e-5）。
  # 推荐范围：1e-4 ~ 5e-4。小数据集可用较低 lr 以避免 catastrophic forgetting。
  learning_rate: 2.0e-4

  # 学习率预热比例。
  # 训练初期，lr 从 0 线性增加到 learning_rate，warmup_ratio × total_steps 步后完成。
  # 预热有助于稳定训练初期的梯度方向，避免前几步梯度过大导致模型震荡。
  # 推荐范围：0.01~0.1（即 1%~10% 的总步数）。
  warmup_ratio: 0.03

  # 学习率调度器类型。
  # 可选值：linear, cosine, cosine_with_restarts, polynomial, constant, constant_with_warmup。
  # cosine：先从 learning_rate 余弦衰减到接近 0，是最常用的调度器，训练末期收敛平稳。
  lr_scheduler_type: "cosine"

  # 训练总轮次（epoch）。
  # 432 条数据 + LoRA r=8 场景，100 epochs 通常足够收敛。
  # 配合 early_stopping_patience 自动早停，避免无效训练。
  # 若数据量增至 1000+，可降低到 20~50。
  num_train_epochs: 100

  # ---- 正则化（防过拟合） ----

  # 权重衰减（L2 正则化）。
  # 对 LoRA 权重施加 L2 惩罚，限制权重幅度，提升泛化能力。
  # 0 表示不衰减。推荐 0.01~0.05，数据量越小值越大。
  weight_decay: 0.01

  # 梯度裁剪阈值。
  # 限制梯度的最大 L2 范数，防止单步更新过大导致训练震荡。
  # 0 表示不裁剪。LoRA 训练推荐 1.0。
  max_grad_norm: 1.0

  # NEFTune 噪声强度。
  # 在 embedding 层注入均匀随机噪声，显著提升指令微调泛化效果。
  # 推荐 5~15。0 表示禁用。
  # 仅 TRL ≥ 0.12 支持。
  neftune_noise_alpha: 5

  # ---- 早停 ----

  # 早停耐心值（epoch 数）。
  # 若 eval_loss 在 patience 个 epoch 内未改善，自动停止训练。
  # 0 表示禁用早停。配合 load_best_model_at_end 自动加载最优权重。
  early_stopping_patience: 10

  # 早停阈值。
  # eval_loss 需改善超过此阈值才算"有改善"，避免因浮点抖动误判。
  early_stopping_threshold: 0.001

  # ---- 评估分割 ----

  # 验证集比例。
  # 从全量数据中划分此比例作为验证集（不参与训练），用于早停和过拟合检测。
  # 推荐 0.1~0.15。432 条数据取 0.1 = 43 条验证集。
  eval_split_ratio: 0.1

  # 日志打印间隔（步数）。
  # 每隔 logging_steps 步打印一次 training loss、lr、eval_loss 等指标。
  # 过小 → 日志刷屏；过大 → 无法及时观察训练状态。
  logging_steps: 10

  # checkpoint 保存策略。
  # 可选值：
  #   "no"        — 不保存 checkpoint
  #   "epoch"     — 每个 epoch 结束时保存
  #   "steps"     — 每隔 save_steps 步保存（需同时设置 save_steps）
  #   "best"      — 仅在 eval_loss 改善时保存（推荐，配合 early stopping）
  save_strategy: "best"

  # 保存的 checkpoint 总数上限。
  # 仅保留最近的 N 个 best checkpoint，旧的自动删除，节省磁盘。
  save_total_limit: 3

  # 用于比较"最优"模型的指标。
  # 需与 save_strategy="best" 配合使用。
  metric_for_best_model: "eval_loss"

  # 训练结束时自动加载最优 checkpoint（而非最后一个）。
  # 配合 early stopping + save_strategy="best" 使用，确保拿到最佳模型。
  load_best_model_at_end: true

# ============================================================
# 对话模板
# ============================================================

# assistant 回复的起始标记。
# DataCollatorForCompletionOnlyLM 通过查找此字符串定位 assistant 回复的位置，
# 将之前的 token（system + user 部分）的 label 设为 -100，
# 从而仅对 assistant 回复计算 loss，不学习提问部分。
# Qwen2.5 的 assistant 标记为 "<|im_start|>assistant\n"。
# 其他模型需相应修改：Llama 为 "assistant\n"，ChatGLM 为 "<|assistant|>"。
response_template: "<|im_start|>assistant\n"

# 系统提示词。
# 在每条对话开头插入，定义模型的角色和行为风格。
# 训练和推理时需保持一致。
system_prompt: "You are a helpful assistant."

# ============================================================
# 设备
# ============================================================

# 使用的 GPU 编号。
# "0" 表示第一张 GPU。使用 "0,1" 选择多张（需同步修改训练脚本以支持 DDP）。
# 当前脚本为单卡场景，多卡需额外配置 accelerate 或 torchrun。
cuda_visible_devices: "0"

# ============================================================
# 镜像加速
# ============================================================

# Hugging Face 服务端点。
# 国内环境使用 https://hf-mirror.com 加速模型和数据集下载。
# 海外环境可改为 https://huggingface.co（官方默认）。
hf_endpoint: "https://hf-mirror.com"

# ============================================================
# 评估
# ============================================================
eval:
  # 评测样本数量。
  # 从数据集中随机抽取 N 条用于评估（不参与训练打分仅做推断）。
  # 设置为 0 表示使用全部数据。
  num_samples: 50

  # 生成参数。
  max_new_tokens: 512                     # 生成回答的最大 token 数
  temperature: 0.1                        # 低温采样（越低越确定，便于对比复现）

  # 评估报告输出路径（相对于项目根目录）。
  report_path: "./eval_report.md"         # Markdown 评测报告
  json_path: "./eval_results.json"        # 结构化原始数据（供程序化分析）


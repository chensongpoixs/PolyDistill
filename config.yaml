# ============================================================
# PolyDistill — 工业级多教师知识蒸馏训练配置
# ============================================================
# 用法：
#   python scripts/train.py                  （自动读取 ./config.yaml）
#   python scripts/train.py --config prod.yaml（指定其他配置文件）
#
# 字段命名全部使用小写 + 下划线（snake_case），
# config.py 会自动映射到大写属性名（UPPER_CASE）。
# ============================================================

# ============================================================
# 1. 模型
# ============================================================
# 学生模型：Hugging Face 模型 ID 或本地路径。
# 支持 Qwen3 家族多个规格，按需切换。
#
# ┌─────────────────────┬──────────┬──────────┬──────────┬──────────┬────────────────────────────┐
# │ 模型 ID             │ 参数量   │ 层数     │ BF16显存 │ 训练显存 │ 适用场景                   │
# ├─────────────────────┼──────────┼──────────┼──────────┼──────────┼────────────────────────────┤
# │ Qwen/Qwen3-0.6B     │ 0.6B     │ 28       │ ~1.2 GB  │ ~4 GB    │ 8GB 显卡，快速原型/端侧    │
# │ Qwen/Qwen3-1.7B     │ 1.7B     │ 28       │ ~3.4 GB  │ ~8 GB    │ 16GB 显卡，追求更高质量     │
# │ Qwen/Qwen3-4B       │ 4B       │ 36       │ ~7.6 GB  │ ~14 GB   │ 16GB+ 显卡，平衡质量与速度  │
# │ Qwen/Qwen3-8B       │ 8B       │ 36       │ ~16 GB   │ ~22 GB   │ 24GB 显卡，接近生产级效果   │
# └─────────────────────┴──────────┴──────────┴──────────┴──────────┴────────────────────────────┘
#
# 注：训练显存 = BF16模型 + LoRA + 激活值(FA) + 梯度检查点 + batch数据，实测值因配置而异。
#     RTX 5080(16GB): 建议 0.6B/1.7B/4B(检查点开)，8B 显存不足
#     RTX 4090(24GB): 全部可跑，8B 需开启梯度检查点
#     RTX 3090(24GB): 全部可跑，8B 需开启梯度检查点
#
# 切换模型时同步调整：
#   cache_dir          — 模型缓存路径
#   output_dir         — 输出目录（避免不同模型 adapter 覆盖）
#   per_device_batch   — 按显存调整（大模型减半）
#   num_train_epochs   — 大模型收敛更快，可适当减少 epoch
#   target_modules     — 大模型可增加 LoRA 模块（k_proj/o_proj/gate_proj 等）
#   gradient_checkpointing — 4B/8B 建议强制开启
#   lora_r             — 大模型可降秩节省显存（r=8~16）
# model_id: "Qwen/Qwen3-0.6B"
# model_id: "Qwen/Qwen3-1.7B"
# model_id: "Qwen/Qwen3-4B"
model_id: "Qwen/Qwen3-4B"

# 注意力实现方式（显存/速度权衡）：
#   "auto"                — 自动检测: FA3(Blackwell) > FA2(Ampere/Hopper) > SDPA（推荐）
#   "flash_attention_2"   — Flash Attention，HF 自动根据 GPU 架构选择 FA3/FA2
#   "sdpa"                — PyTorch 2.0+ 内置 SDPA（无需额外安装，BF16/FP32精度，最稳定）
#   "eager"               — 原生 attention（兼容性最好，显存最大）
#
# ⚠️  4B+ 模型 + Blackwell GPU (RTX 5080/5090)：
#   FA3 使用 FP8 中间精度，大模型 attention score 可能超范围 → NaN 梯度。
#   强烈建议使用 "sdpa"（精度 BF16/FP32, 稳定性好, 显存接近 FA）。
attn_implementation: "sdpa"

# ============================================================
# 2. 数据
# ============================================================
# 蒸馏数据目录（相对于项目根目录）。
# 仅支持 Parquet 格式（reasoning-distill schema）。
# JSON 数据需先转换: python poly_distill/json_to_parquet.py
#
# Parquet 列：
#   messages  : list<{role, content}>  — 对话消息（通常仅 user 角色）
#   thinking  : str                    — 推理/思考过程（可选，用于 CoT 蒸馏）
#   response  : str                    — 最终回答
#   system    : str                    — 系统提示词（可选，fallback 到下方 system_prompt）
#
# 训练时 thinking + response 自动拼接为 assistant content，整段计算 loss。
data_dir: "./data/ai_infra_audio_video"

# ============================================================
# 3. 路径
# ============================================================
# 实验产物根目录（YOLOv5 风格，每次训练自动创建自增子目录）。
#   首次训练: runs/train/exp/
#   第二次:   runs/train/exp2/
#   第N次:    runs/train/exp{N}/
# 所有产物（LoRA adapter / 日志 / 评测报告 / checkpoint）均归入该目录。
# 切换模型时无需手动修改 output_dir — 代码自动将 output_dir 重定向到实验目录。
runs_dir: "./runs/train"

# 模型下载缓存目录。
# 首次运行从 Hugging Face 下载到此目录，之后直接读缓存。
#   0.6B 约 1.2 GB，1.7B 约 3.4 GB，4B 约 7.6 GB，8B 约 16 GB。
#
# 按模型切换（取消注释对应行）：
# cache_dir: "./models/qwen3-1.7b"
# cache_dir: "./models/qwen3-0.6b"
cache_dir: "./models/qwen3-4b"
# cache_dir: "./models/qwen3-8b"

# LoRA adapter 输出目录（训练时自动重定向到 runs/train/exp{N}/）。
# 仅在 --eval-only 模式下使用此路径作为 adapter 加载源。
# 切换模型时可手动指定，但正常训练时此值会被实验目录覆盖。
output_dir: "./lora_sft_ai_infra_audio_video_output_4B"

# ============================================================
# 4. 知识蒸馏参数（工业级）
# ============================================================
# 蒸馏是将教师模型的知识迁移到学生模型的核心机制。
# 当前实现：黑盒指令蒸馏（Black-box Instruction Distillation）
#   — 从教师 API 获取高质量回答作为训练目标
#   — 学生通过 SFT 学习教师的回答风格和知识
#
# 后续扩展：
#   — Logit 层蒸馏：对齐教师-学生的输出概率分布
#   — 特征层蒸馏：对齐中间层隐藏状态
distillation:

  # ---- 教师模型配置 ----
  # 教师池：从多个商业 API 获取回答，融合后作为训练信号。
  # 当前采用单教师模式（数据预先由教师生成并存入 Parquet）。
  # 多教师在线蒸馏时，以下参数控制教师调用行为。
  teachers:
    # 教师列表（模型标识符，与 API 适配器对应）
    models: ["GPT", "Claude", "Gemini"]

    # 教师权重：融合多教师回答时的权重分配。
    # 权重越高，该教师的回答在最终训练信号中影响越大。
    # 总和无需为 1（内部自动归一化）。
    weights: [1.0, 1.0, 1.0]

    # 每个问题的教师采样策略：
    #   "all"     — 所有教师均生成回答，融合后训练（质量最高，成本最高）
    #   "random"  — 随机选一个教师（成本低，引入多样性）
    #   "best"    — 所有教师生成后选最优（需 scoring 函数）
    #   "weighted" — 按 weights 概率采样
    sampling: "all"

    # 教师 API 调用配置
    max_retries: 3               # 单次调用最大重试次数
    request_timeout: 60          # 单次请求超时（秒）
    rate_limit_rpm: 50           # 每分钟最大请求数（各教师独立计算）
    max_tokens: 2048             # 教师回答最大 token 数
    temperature: 0.7             # 教师生成温度（>0 引入多样性，=0 确定性最高）

  # ---- 蒸馏温度 ----
  # 温度软化教师输出概率分布。
  # T > 1：软化分布，暴露更多类别间关系（"暗知识"），
  #         学生能学到教师对错误选项的相对偏好。
  # T = 1：不软化，直接拟合 one-hot 目标。
  #
  # 推荐：
  #   小数据集（<500 条）：T=2~3（软化有助于泛化）
  #   大数据集（>2000 条）：T=3~5（数据足够，软化可学到更丰富知识）
  temperature: 4.0

  # ---- 蒸馏损失权重 ----
  # 多任务学习中的损失权重分配：
  #   sft_weight:    标准 SFT 交叉熵损失（拟合教师回答文本）
  #   distill_weight: 蒸馏损失（拟合教师输出概率分布，需要 logits 访问权限）
  #
  # 当前黑盒模式下仅使用 SFT loss（distill_weight=0）。
  # 灰盒/白盒模式下增加 distill_weight 可进一步提升效果。
  loss:
    sft_weight: 1.0
    distill_weight: 0.0

  # ---- 回答质量过滤 ----
  # 自动过滤低质量的教师回答，避免噪声污染训练数据。
  quality_filter:
    enabled: true
    min_response_length: 50      # 最小回答长度（字符），过短视为无效
    max_response_length: 4096    # 最大回答长度，过长截断
    skip_empty: true             # 跳过空回答
    skip_duplicates: true        # 跳过完全相同的回答（去重）

  # ---- 数据增强 ----
  # 小数据集场景下的数据扩充策略。
  augmentation:
    enabled: false               # 是否启用（小数据集推荐开启）
    paraphrase_count: 2          # 每条数据生成几个改写版本
    back_translation: false      # 回译增强（中文→英文→中文）
    shuffle_options: false       # 选择题选项打乱

# ============================================================
# 5. LoRA 参数（Low-Rank Adaptation）
# ============================================================
# LoRA 核心思想：不微调原始权重矩阵 W，而是训练低秩增量 ΔW = B·A。
# 推理时合并 W' = W + ΔW，无额外推理延迟。
# 可训练参数量从 ~500M 降至 ~2M（r=8 时）。
lora:

  # 低秩矩阵的秩（rank）。
  # r 越大 → 表达能力越强，可训练参数越多（参数量 ∝ r）。
  # r 越小 → 正则化效果越强，过拟合风险越低。
  #
  # 推荐（按数据量）：
  #   100 条  → r=4  （极简，强正则化）
  #   500 条  → r=8  （轻量，平衡）
  #   1000 条 → r=16 （中等，推荐起步值）
  #   2000 条 → r=32 （增强表达）
  #   5000 条 → r=64 （接近全量微调效果）
  r: 32

  # LoRA 缩放系数。
  # 实际缩放因子 = alpha / r。通常 alpha = 2 × r。
  # alpha 越大 → LoRA 输出对原始表示的扰动越大。
  alpha: 32

  # LoRA 层的 dropout 概率。
  # 在低秩矩阵训练时随机丢弃神经元，防止过拟合。
  #
  # 推荐（按数据量）：
  #   100 条  → 0.15（强正则）
  #   500 条  → 0.10（中等正则）
  #   1000+ 条→ 0.05（轻度正则）
  dropout: 0.05

  # 要应用 LoRA 的目标模块列表。
  # Qwen 系列可选：q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj
  #
  # 当前仅微调 Q 和 V 投影矩阵（工业界最稳定配置）：
  #   — 可训练参数最少（r=8 时约 2M），过拟合风险最低
  #   — 指令跟随能力提升显著
  #   — 需更强表达力时可追加 "k_proj", "o_proj"
  #
  # 按模型大小的 LoRA 模块建议（数据量 ≥ 2000）：
  #   0.6B：q_proj + v_proj（~2-4M trainable，防过拟合）
  #   1.7B：q_proj + v_proj + k_proj + o_proj（~8M trainable）
  #   4B：  q_proj + v_proj + k_proj + o_proj（~16M trainable，也可加 gate_proj）
  #   8B：  q_proj + v_proj + k_proj + o_proj + gate_proj + up_proj（~24M trainable）
  #   显存紧张时优先砍 gate_proj/up_proj，保留 q_proj + v_proj 核心
  target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]
  #target_modules: ["q_proj", "v_proj"]
# ============================================================
# 6. 训练超参数
# ============================================================
training:

  # ---- 批次配置 ----
  # 每张 GPU 的 micro batch size。按显存选择：
  #   0.6B BF16：per_device_batch_size=4~8（~4-8GB 显存）
  #   1.7B BF16：per_device_batch_size=2~4（~8-12GB 显存）
  #   4B BF16：  per_device_batch_size=1（~13-15GB 显存，需开梯度检查点）
  #   8B BF16：  per_device_batch_size=1（~20-23GB 显存，必须开梯度检查点）
  #   若显存超限，优先减少 batch_size 再开启梯度累积
  per_device_batch_size: 1

  # 梯度累积步数。
  # 等效 batch = per_device_batch_size × gradient_accumulation_steps
  #            = 1 × 16 = 16
  #
  # 小数据集用小 batch（梯度噪声有助于泛化），大数据集用大 batch（梯度更准）。
  gradient_accumulation_steps: 8

  # ---- 学习率 ----
  # LoRA 微调推荐 lr 高于全量微调（全量通常 1e-5 ~ 5e-5）。
  #
  # 推荐（按数据量）：
  #   100 条  → 5e-5  （小心更新，防止 catastrophic forgetting）
  #   500 条  → 1e-4
  #   1000 条 → 2e-4  （推荐起步值）
  #   2000+ 条→ 3e-4
  #   5000+ 条→ 5e-4
  #
  # 大模型（4B/8B）学习率建议略低：
  #   4B：2e-4 ~ 3e-4（模型已有较好先验，无须大幅更新）
  #   8B：1e-4 ~ 2e-4（参数量大，高 lr 易破坏预训练知识）
  learning_rate: 2.0e-4

  # 学习率预热比例。
  # 训练初期 lr 从 0 线性增加到 learning_rate，预热 = warmup_ratio × total_steps 步。
  # 小数据集预热应更长（训练步数少，需更多步到达目标 lr）。
  #
  # 推荐：小数据 0.05–0.1，大数据 0.02–0.03
  warmup_ratio: 0.03

  # 学习率调度器。
  # cosine:      从 learning_rate 余弦衰减到接近 0（最常用，收敛平稳）
  # linear:      线性衰减
  # constant:    恒定学习率（不推荐蒸馏场景）
  # cosine_with_restarts: 带重启的余弦（大数据集可能受益）
  lr_scheduler_type: "cosine"

  # 训练总轮次。
  #
  # 推荐（按数据量）：
  #   100 条  → 200（数据少，需多轮曝光）
  #   500 条  → 100
  #   1000 条 → 50
  #   2000 条 → 30
  #   5000 条 → 15
  #   10000 条→ 10
  #
  # 大模型（4B/8B）收敛更快，epoch 可减少 30-50%：
  #   4B：数据 2000 条 → 15-20 epoch；5000 条 → 8-12 epoch
  #   8B：数据 2000 条 → 10-15 epoch；5000 条 → 5-10 epoch
  # 配合 early_stopping_patience 自动早停，实际 epoch 通常远小于设定值。
  num_train_epochs: 1

# ============================================================
# 7. 正则化
# ============================================================
  # ---- 权重衰减（L2 正则化） ----
  # 对 LoRA 权重施加 L2 惩罚，限制权重幅度。
  # 小数据集用大值（强正则化），大数据集用小值。
  #
  # 推荐：100 条→0.05，500 条→0.02，1000+ 条→0.01
  weight_decay: 0.05

  # ---- 梯度裁剪 ----
  # 限制梯度的最大 L2 范数，防止单步更新过大。
  # 蒸馏训练推荐 1.0（LoRA 参数量小，梯度通常不会爆）。
  max_grad_norm: 1.0

  # ---- NEFTune 噪声注入 ----
  # 在 embedding 层注入均匀随机噪声 U(-α/√d, α/√d)。
  # 显著提升小数据集指令微调泛化性（论文：NEFTune, NeurIPS 2023）。
  #
  # 推荐：小数据（<500 条）→ 8–10，中数据 → 5，大数据（>5000 条）→ 0
  # 需要 transformers ≥ 4.38
  neftune_noise_alpha: 5

# ============================================================
# 8. 早停与检查点
# ============================================================
  # ---- 早停 ----
  # eval_loss 在 patience 个 epoch 内改善 < threshold 则停止。
  # 小数据集 patience 应更大（波动大，需要更多 epoch 确认收敛）。
  early_stopping_patience: 0
  early_stopping_threshold: 0.001

  # ---- 验证集分割 ----
  # 从全量数据中划分此比例作为验证集（用于早停和过拟合检测）。
  # 数据量 < 500 时建议 0.15，500–2000 用 0.1，>2000 用 0.05
  eval_split_ratio: 0.1

  # ---- 日志与保存 ----
  # 梯度检查点：用 ~20% 训练速度换取 ~50% 显存节省。
  # 0.6B/1.7B：可选（16GB 显卡足够存放激活值）
  # 4B/8B：   必须开启（16GB 显卡不开 GC 无法训练 4B；24GB 不开 GC 无法训练 8B）
  #            推荐 24GB 显卡跑 8B 时开启，否则 batch=1 也会 OOM
  gradient_checkpointing: true

  # ---- DataLoader 优化（缓解 GPU 数据饥饿） ----
  # 数据预处理子进程数。0=主进程同步加载（GPU 常等待数据）。
  # 推荐 8-16（8+ 核 CPU 时 GPU SM 利用率可提升 30-50%）。
  dataloader_num_workers: 2

  # 锁页内存（pinned memory）。开启后 GPU DMA 异步拷贝，加速 10-20%。
  dataloader_pin_memory: true

  # 每个 worker 预取 batch 数。worker 在 GPU 计算时异步准备下一批数据。
  # 默认 2，设为 4 可进一步缓解 GPU 数据饥饿（增加少量 CPU 内存占用）。
  dataloader_prefetch_factor: 4

  # ---- 张量存储精度（减少 CPU→GPU 传输量） ----
  # 软标签蒸馏数据存储 dtype（未来 logit 蒸馏功能）。
  #   "float16"  — 半精度，传输量减半，数值精度略降（推荐）
  #   "bfloat16" — BF16，范围同 FP32，需 GPU SM≥80
  #   "float32"  — 全精度，兼容性最好但传输量大
  storage_logit_dtype: "float16"

  # input_ids / labels 存储 dtype。
  #   "int32"  — 4 bytes，词表 < 2^31 足够（推荐，传输量减半）
  #   "int64"  — 8 bytes，HuggingFace 默认
  storage_token_dtype: "int32"

  # 控制台日志打印间隔（步数）。
  # 小数据集可设小值（如 5）实时观察，大数据集设大值（如 50）减少刷屏。
  logging_steps: 1

  # checkpoint 保存策略：
  #   "best"  — 仅 eval_loss 改善时保存（推荐）
  #   "epoch" — 每个 epoch 保存（磁盘占用大）
  #   "no"    — 不保存中间 checkpoint
  save_strategy: "best"

  # 最多保留 N 个 best checkpoint，旧自动删除。
  save_total_limit: 3

  # 比较最优模型的指标。
  metric_for_best_model: "eval_loss"

  # 训练结束时自动加载最优 checkpoint。
  load_best_model_at_end: true

# ============================================================
# 9. 对话模板
# ============================================================
# assistant 回复的起始标记。
# DataCollatorForCompletionOnlyLM 通过此标记定位 assistant 回复位置，
# 将其之前的 token（system + user 部分）label 设为 -100，
# 仅对 assistant 回复计算 loss。
#
# 常见模型标记：
#   Qwen3:    "<|im_start|>assistant\n"
#   Llama3:   "<|start_header_id|>assistant<|end_header_id|>\n\n"
#   ChatGLM:  "<|assistant|>"
response_template: "<|im_start|>assistant\n"

# 系统提示词（训练与推理时保持一致）。
system_prompt: "You are a helpful assistant."

# ============================================================
# 10. 设备
# ============================================================
# 使用的 GPU 编号。"0" = 第一张，单卡场景。
cuda_visible_devices: "0"

# ============================================================
# 11. 镜像加速
# ============================================================
# Hugging Face 服务端点。
# 国内：https://hf-mirror.com（默认），海外：https://huggingface.co
hf_endpoint: "https://hf-mirror.com"

# ============================================================
# 12. 日志
# ============================================================
log:
  # DEBUG / INFO / WARNING / ERROR
  level: "INFO"

  # 日志文件路径。同时输出到控制台和此文件。
  file: "./train.log"

  # 日志格式。可用变量：asctime, levelname, name, message
  format: "%(asctime)s [%(levelname)s] %(filename)s:%(lineno)d: %(message)s"

# ============================================================
# 13. 评估
# ============================================================
eval:
  # 评测样本数量。随机抽取，固定种子 42 保证可复现。0 = 全部。
  num_samples: 50

  # 生成参数
  max_new_tokens: 512           # 最大生成 token 数
  temperature: 0.1              # 低温采样（越低越确定）

  # 评估报告输出路径
  report_path: "./eval_report.md"
  json_path: "./eval_results.json"

  # ---- 评估维度开关（默认全开，按需关闭以加速或节省 API 费用） ----

  # PPL（困惑度）：衡量模型对测试文本的拟合度，越低越好。计算快，无外部依赖。
  ppl:
    enabled: false

  # ROUGE-L（字面匹配）：基于 LCS 最长公共子序列。计算快，但对同义改写不友好。
  # 默认关闭，用 BERTScore（语义相似度）替代。需快速参考时可临时开启。
  rouge:
    enabled: false

  # BERTScore（语义相似度）：BERT 向量余弦相似度，能识别"意思相同表述不同"的改写。
  # 依赖 bert-base-chinese（~440MB），首次运行自动下载。需 pip install bert-score。
  bertscore:
    enabled: false

  # 生成样本对比：Base vs LoRA 实际输出并排对比。供人工抽查判断。
  gen_samples:
    enabled: true

  # 通用能力评估：20 道跨领域问题（数学/科学/逻辑/中文/代码），检测灾难性遗忘。
  general_ability:
    enabled: false

  # ---- LLM-as-Judge（大模型打分评估） ----
  # 启用后，将生成样本发送给外部大模型做 5 维度三方对比质量评分。
  # 要求外部 LLM 兼容 OpenAI Chat Completions API 格式。
  llm_judge:
    enabled: true                                           # 是否启用（true/false）
    endpoint: "http://221.10.121.80:20002/v1/chat/completions"  # LLM API 地址
    model: "gemma-4-31B-it-Q4_0"                            # 裁判模型名称
    api_key: "sk-xxxxxxxxxxxxxxxxxxxxxxxx"                  # API Key（留空则从环境变量 LLM_JUDGE_API_KEY 读取）
    max_samples: 50                                         # 最大评估样本数（避免 API 费用过高）
    timeout: 600                                            # 请求超时秒数（默认 10 分钟）
    temperature: 0.0                                        # 采样温度（0=贪婪解码，评估推荐低温）
    max_tokens: 10240                                        # 最大生成 token 数
    top_p: 1.0                                              # nucleus 采样
    seed: 42                                                # 随机种子（评估结果可复现）
    max_retries: 2                                          # 失败自动重试次数


# ============================================================
# 14. 模型导出
# ============================================================
# 将 LoRA adapter 合并到基座模型，产出可独立分发的完整模型（TinySage）。
# 用法: python scripts/export.py
export:
  # 导出目录。留空则根据 model_id 自动推导：
  #   Qwen/Qwen3-0.6B → ./models/TinySage-0.6B
  #   Qwen/Qwen3-1.7B → ./models/TinySage-1.7B
  #   Qwen/Qwen3-4B   → ./models/TinySage-4B
  #   Qwen/Qwen3-8B   → ./models/TinySage-8B
  # 也可手动指定（CLI --output 优先级最高）。
  output_dir: ""

# ============================================================
# 附录 A：按数据量调参速查表
# ============================================================
#
# ┌──────────┬───────┬───────┬───────┬───────┬───────┬────────┐
# │ 参数     │ 100   │ 500   │ 1000  │ 2000  │ 5000  │ 10000  │
# ├──────────┼───────┼───────┼───────┼───────┼───────┼────────┤
# │ LoRA r   │ 4     │ 8     │ 16    │ 32    │ 64    │ 64     │
# │ LoRA α   │ 8     │ 16    │ 32    │ 64    │ 128   │ 128    │
# │ dropout  │ 0.15  │ 0.10  │ 0.10  │ 0.05  │ 0.05  │ 0.05   │
# │ lr       │ 5e-5  │ 1e-4  │ 2e-4  │ 3e-4  │ 5e-4  │ 5e-4   │
# │ epochs   │ 200   │ 100   │ 50    │ 30    │ 15    │ 10     │
# │ batch    │ 2×4=8 │ 4×4=16│ 4×8=32│ 8×8=64│ 16×8=  │ 32×8=  │
# │          │       │       │       │       │ 128    │ 256    │
# │ w_decay  │ 0.05  │ 0.02  │ 0.01  │ 0.01  │ 0.005  │ 0.005  │
# │ warmup   │ 0.10  │ 0.05  │ 0.03  │ 0.03  │ 0.02   │ 0.02   │
# │ patience │ 20    │ 15    │ 10    │ 8     │ 5      │ 5      │
# │ eval_sp  │ 0.15  │ 0.15  │ 0.10  │ 0.10  │ 0.05   │ 0.05   │
# │ NEFTune  │ 10    │ 8     │ 5     │ 5     │ 3      │ 0      │
# │ temp     │ 2.0   │ 2.0   │ 2.0   │ 3.0   │ 3.0    │ 4.0    │
# │ target   │ q+v   │ q+v   │ q+v   │ q+v+  │ q+v+   │ q+v+   │
# │ modules  │       │       │       │ k+o   │ k+o+g  │ k+o+g+ │
# │          │       │       │       │       │ +u+d   │ u+d    │
# └──────────┴───────┴───────┴───────┴───────┴───────┴────────┘
#
# 缩略说明：
#   r      = LoRA rank
#   α       = LoRA alpha (通常 = 2×r)
#   dropout = LoRA dropout
#   lr      = 学习率
#   epochs  = 最大训练轮次
#   batch   = per_device_batch_size × gradient_accumulation_steps
#   w_decay = weight_decay (L2 正则)
#   warmup  = warmup_ratio
#   patience= early_stopping_patience
#   eval_sp = eval_split_ratio
#   NEFTune = neftune_noise_alpha (0=禁用)
#   temp    = 蒸馏温度
#   target  = LoRA 目标模块（q=q_proj, v=v_proj, k=k_proj, o=o_proj,
#             g=gate_proj, u=up_proj, d=down_proj）
#
# ============================================================
# 附录 B：数据量与策略指南
# ============================================================
#
# 【100 条 — 极少量原型验证】
#   定位：快速跑通流程，验证数据格式和蒸馏链路是否正确。
#   策略：
#     — LoRA r=4 极简防止严重过拟合，dropout=0.15 强正则
#     — 学习率 5e-5 极小步更新，NEFTune=10 最大化泛化
#     — epoch=200 + patience=20，给足收敛时间
#     — 数据增强强烈建议开启（paraphrase_count=3）
#     — 预期：PPL 明显下降，ROUGE-L 0.15–0.25，人工可感知改进
#   风险：极易过拟合，eval_loss 曲线需密切监控。
#
# 【500 条 — 小规模实验】
#   定位：验证蒸馏策略有效性，迭代 prompt/数据质量。
#   策略：
#     — LoRA r=8 标准配置，dropout=0.10
#     — 学习率 1e-4 适中更新，NEFTune=8
#     — epoch=100 + patience=15
#     — 蒸馏温度 T=2 软化教师分布
#     — 预期：ROUGE-L > 0.2，回答风格接近教师
#   风险：数据质量对效果影响大，需人工抽查教师回答。
#
# 【1000 条 — 推荐起步规模】
#   定位：项目默认配置，性价比最高。
#   策略：
#     — LoRA r=16 起，alpha=32，增加表达能力
#     — 学习率 2e-4，warmup=0.03，标准配置
#     — epoch=50 + patience=10
#     — 可开启多教师融合（sampling="all"）
#     — 预期：ROUGE-L > 0.25，回答专业化程度明显提升
#
# 【2000 条 — 中等规模】
#   定位：数据覆盖较全，模型能力显著提升。
#   策略：
#     — LoRA r=32，可扩展 target_modules 到 k_proj/o_proj
#     — 学习率 3e-4，batch=64
#     — epoch=30，蒸馏温度 T=3
#     — 关闭 NEFTune（数据足够，噪声可能干扰）
#     — 预期：ROUGE-L > 0.3，专业回答接近教师水平
#
# 【5000 条 — 大规模】
#   定位：接近生产级效果，覆盖边缘 case。
#   策略：
#     — LoRA r=64，target_modules 扩展至 6 个（q/v/k/o/gate/up）
#     — 学习率 5e-4，batch=128
#     — epoch=15，蒸馏温度 T=3
#     — eval_split_ratio=0.05（数据多，5% 即可）
#     — NEFTune=0 关闭
#     — 预期：ROUGE-L > 0.35，部分回答可超越单一教师
#
# 【10000 条 — 工业级】
#   定位：充分训练，模型稳定可靠。
#   策略：
#     — LoRA r=64，全模块覆盖（7 个 target_modules）
#     — 学习率 5e-4，batch=256，epoch=10
#     — 蒸馏温度 T=4，最大化暗知识迁移
#     — 可开启灰盒蒸馏（distill_weight > 0，需要教师 logits）
#     — 预期：ROUGE-L > 0.4，稳定输出高质量专业回答
#     — 可考虑升级学生模型（Qwen3-4B/8B）进一步提升上限
#
# ============================================================
# 附录 C：按模型规格调参速查表
# ============================================================
#
# 以下为 Qwen3 家族 4 个规格在相同数据量（~2000 条）下的推荐参数。
# 核心原则：大模型 → 低 lr + 少 epoch + 多 LoRA 模块 + 小 batch + 必须开 GC
#
# ┌─────────────────┬───────────┬───────────┬───────────┬───────────┐
# │ 参数            │ 0.6B      │ 1.7B      │ 4B        │ 8B        │
# ├─────────────────┼───────────┼───────────┼───────────┼───────────┤
# │ 推荐 GPU        │ 8GB+      │ 16GB+     │ 16GB+     │ 24GB+     │
# │ per_device_batch│ 4~8       │ 2~4       │ 1~2       │ 1         │
# │ grad_accum      │ 4~8       │ 4~8       │ 8~16      │ 16~32     │
# │ effective_batch │ 16~64     │ 16~32     │ 16~32     │ 16~32     │
# │ LoRA r          │ 16~32     │ 8~16      │ 8~16      │ 8         │
# │ LoRA α          │ 32~64     │ 16~32     │ 16~32     │ 16        │
# │ target_modules  │ q+v       │ q+v+k+o   │ q+v+k+o   │ q+v+k+o+g+u│
# │ lr              │ 2e-4~3e-4 │ 2e-4~3e-4 │ 1e-4~2e-4 │ 1e-4~2e-4 │
# │ epochs          │ 30~50     │ 20~30     │ 15~20     │ 10~15     │
# │ GC (梯度检查点)  │ 可选      │ 可选      │ 必须      │ 必须      │
# │ VRAM (训练峰值)  │ ~4 GB     │ ~8 GB     │ ~14 GB    │ ~22 GB    │
# │ SM 利用率上限   │ 40-60%    │ 50-70%    │ 60-80%    │ 70-90%    │
# │ 训练速度 (it/s) │ ~1.7      │ ~0.9      │ ~0.4      │ ~0.2      │
# │ 可训练参数       │ ~2M       │ ~8M       │ ~16M      │ ~24M      │
# │ 输出 adapter 大小│ ~8 MB     │ ~32 MB    │ ~64 MB    │ ~96 MB    │
# └─────────────────┴───────────┴───────────┴───────────┴───────────┘
#
# 4B 推荐配置（2000 条数据，16GB 显卡）：
#   model_id: "Qwen/Qwen3-4B"
#   cache_dir: "./models/qwen3-4b"
#   output_dir: "./lora_sft_ai_infra_audio_video_output_4b"
#   lora: {r: 16, alpha: 32, dropout: 0.05, target_modules: [q_proj, v_proj, k_proj, o_proj]}
#   training: {per_device_batch_size: 1, gradient_accumulation_steps: 16,
#              learning_rate: 2.0e-4, num_train_epochs: 20,
#              gradient_checkpointing: true, warmup_ratio: 0.05}
#
# 8B 推荐配置（2000 条数据，24GB 显卡）：
#   model_id: "Qwen/Qwen3-8B"
#   cache_dir: "./models/qwen3-8b"
#   output_dir: "./lora_sft_ai_infra_audio_video_output_8b"
#   lora: {r: 8, alpha: 16, dropout: 0.1, target_modules: [q_proj, v_proj, k_proj, o_proj, gate_proj, up_proj]}
#   training: {per_device_batch_size: 1, gradient_accumulation_steps: 32,
#              learning_rate: 1.5e-4, num_train_epochs: 15,
#              gradient_checkpointing: true, warmup_ratio: 0.05}

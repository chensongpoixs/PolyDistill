<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
    <!-- 背景和标题 -->
    <rect width="800" height="600" fill="#f9f9f9" rx="10" ry="10" />
    <text x="400" y="40" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold" fill="#333">FlashAttention vs Standard Attention 原理图</text>
    
    <!-- 图例 -->
    <g transform="translate(600, 60)">
        <rect x="0" y="0" width="20" height="20" fill="#3498db" rx="3" />
        <text x="25" y="15" font-family="Arial" font-size="14" fill="#555">HBM (显存 - 慢/大)</text>
        <rect x="0" y="25" width="20" height="20" fill="#2ecc71" rx="3" />
        <text x="25" y="40" font-family="Arial" font-size="14" fill="#555">SRAM (缓存 - 快/小)</text>
        <rect x="0" y="50" width="20" height="20" fill="#e67e22" rx="3" />
        <text x="25" y="65" font-family="Arial" font-size="14" fill="#555">Compute (算子计算)</text>
    </g>

    <!-- 第一部分：Standard Attention -->
    <g transform="translate(50, 100)">
        <text x="0" y="0" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Standard Attention (内存受限)</text>
        
        <!-- HBM 层 -->
        <rect x="0" y="20" width="700" height="60" fill="#3498db" fill-opacity="0.2" stroke="#3498db" stroke-width="2" stroke-dasharray="5,5" rx="5" />
        <text x="10" y="40" font-family="Arial" font-size="12" fill="#2980b9">HBM (Global Memory)</text>
        
        <!-- 数据块 HBM -->
        <rect x="50" y="30" width="60" height="40" fill="#3498db" rx="3" />
        <text x="62" y="55" font-family="Arial" font-size="12" fill="white">Q,K,V</text>
        
        <rect x="300" y="30" width="120" height="40" fill="#3498db" rx="3" />
        <text x="325" y="55" font-family="Arial" font-size="12" fill="white">S = QKᵀ (N×N)</text>
        
        <rect x="550" y="30" width="120" height="40" fill="#3498db" rx="3" />
        <text x="570" y="55" font-family="Arial" font-size="12" fill="white">P = Softmax(S)</text>

        <!-- SRAM 层 -->
        <rect x="150" y="120" width="100" height="60" fill="#2ecc71" fill-opacity="0.2" stroke="#2ecc71" stroke-width="2" rx="5" />
        <text x="165" y="140" font-family="Arial" font-size="12" fill="#27ae60">SRAM</text>
        
        <rect x="350" y="120" width="100" height="60" fill="#2ecc71" fill-opacity="0.2" stroke="#2ecc71" stroke-width="2" rx="5" />
        <text x="365" y="140" font-family="Arial" font-size="12" fill="#27ae60">SRAM</text>

        <!-- 计算节点 -->
        <rect x="220" y="130" width="60" height="40" fill="#e67e22" rx="5" />
        <text x="232" y="155" font-family="Arial" font-size="10" fill="white">MatMul</text>
        
        <rect x="460" y="130" width="80" height="40" fill="#e67e22" rx="5" />
        <text x="475" y="155" font-family="Arial" font-size="10" fill="white">Softmax</text>

        <!-- 箭头流向 (Standard) -->
        <defs>
            <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
                <polygon points="0 0, 10 3.5, 0 7" fill="#777" />
            </marker>
        </defs>
        
        <!-- 路径 1: QKV -> SRAM -> Compute -> HBM(S) -->
        <path d="M 80 70 L 80 120 L 150 120" fill="none" stroke="#777" stroke-width="2" marker-end="url(#arrowhead)" />
        <path d="M 250 150 L 300 150 L 300 80" fill="none" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)" />
        <text x="260" y="110" font-family="Arial" font-size="11" fill="#e74c3c" font-weight="bold">写入 HBM (慢!)</text>

        <!-- 路径 2: HBM(S) -> SRAM -> Compute -> HBM(P) -->
        <path d="M 360 80 L 360 120 L 350 120" fill="none" stroke="#777" stroke-width="2" marker-end="url(#arrowhead)" />
        <path d="M 450 150 L 550 150 L 550 80" fill="none" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)" />
        <text x="470" y="110" font-family="Arial" font-size="11" fill="#e74c3c" font-weight="bold">再次写入 HBM</text>
    </g>

    <!-- 第二部分：FlashAttention -->
    <g transform="translate(50, 320)">
        <text x="0" y="0" font-family="Arial" font-size="18" font-weight="bold" fill="#333">FlashAttention (IO 优化)</text>
        
        <!-- HBM 层 -->
        <rect x="0" y="20" width="700" height="60" fill="#3498db" fill-opacity="0.2" stroke="#3498db" stroke-width="2" stroke-dasharray="5,5" rx="5" />
        <text x="10" y="40" font-family="Arial" font-size="12" fill="#2980b9">HBM (Global Memory)</text>
        
        <rect x="50" y="30" width="60" height="40" fill="#3498db" rx="3" />
        <text x="62" y="55" font-family="Arial" font-size="12" fill="white">Q,K,V</text>
        
        <rect x="550" y="30" width="120" height="40" fill="#3498db" rx="3" />
        <text x="570" y="55" font-family="Arial" font-size="12" fill="white">Final Output</text>

        <!-- SRAM 层 (核心) -->
        <rect x="150" y="110" width="400" height="120" fill="#2ecc71" fill-opacity="0.2" stroke="#2ecc71" stroke-width="2" rx="5" />
        <text x="160" y="130" font-family="Arial" font-size="14" font-weight="bold" fill="#27ae60">SRAM (Tiling 分块计算)</text>
        
        <!-- SRAM 内部的小块 -->
        <rect x="180" y="140" width="80" height="40" fill="#2ecc71" rx="3" />
        <text x="195" y="165" font-family="Arial" font-size="12" fill="white">Block Q</text>
        
        <rect x="280" y="140" width="80" height="40" fill="#2ecc71" rx="3" />
        <text x="295" y="165" font-family="Arial" font-size="12" fill="white">Block K</text>
        
        <rect x="380" y="140" width="80" height="40" fill="#2ecc71" rx="3" />
        <text x="395" y="165" font-family="Arial" font-size="12" fill="white">Block V</text>
        
        <!-- 内部计算循环 -->
        <rect x="260" y="190" width="120" height="30" fill="#e67e22" rx="5" />
        <text x="275" y="210" font-family="Arial" font-size="12" fill="white">Online Softmax &amp; Sum</text>

        <!-- 箭头流向 (Flash) -->
        <!-- HBM -> SRAM -->
        <path d="M 80 80 L 80 140 L 180 140" fill="none" stroke="#777" stroke-width="2" marker-end="url(#arrowhead)" />
        <text x="90" y="110" font-family="Arial" font-size="11" fill="#555">分块加载</text>
        
        <!-- SRAM Internal Loop -->
        <path d="M 220 160 L 260 200" fill="none" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead)" />
        <path d="M 340 160 L 320 190" fill="none" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead)" />
        <path d="M 420 160 L 380 200" fill="none" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead)" />
        
        <!-- SRAM -> HBM -->
        <path d="M 380 220 L 380 260 L 550 260 L 550 80" fill="none" stroke="#2ecc71" stroke-width="3" marker-end="url(#arrowhead)" />
        <text x="420" y="255" font-family="Arial" font-size="12" fill="#27ae60" font-weight="bold">仅写回最终结果 (高效!)</text>
    </g>
    
    <!-- 底部总结 -->
    <rect x="50" y="540" width="700" height="40" fill="#fff" stroke="#ddd" rx="5" />
    <text x="400" y="565" text-anchor="middle" font-family="Arial" font-size="14" fill="#666">结论：Standard Attention 频繁读写 HBM (O(N²) IO) $\rightarrow$ FlashAttention 在 SRAM 中完成计算 (O(N) IO)</text>
</svg>

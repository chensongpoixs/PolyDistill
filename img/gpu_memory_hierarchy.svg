<svg viewBox="0 0 740 280" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">
  <title>GPU 内存层级架构图</title>
  <!-- 层级金字塔 -->
  <!-- L2 Cache-->
  <rect x="260" y="220" width="220" height="28" rx="5" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="370" y="238" font-size="11" fill="#475569" text-anchor="middle">L2 Cache ~40 MB | ~2 TB/s</text>

  <!-- L1/SMEM -->
  <rect x="180" y="170" width="380" height="28" rx="5" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="370" y="188" font-size="11" fill="#92400E" text-anchor="middle">L1 Cache + Shared Memory ~128 KB/SM × 84 = ~10.5 MB | ~10 TB/s</text>

  <!-- Register -->
  <rect x="120" y="120" width="500" height="28" rx="5" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="370" y="138" font-size="11" fill="#1E40AF" text-anchor="middle">Register File ~256 KB/SM × 84 = ~21 MB | ~40 TB/s</text>

  <!-- HBM -->
  <rect x="40" y="272" width="660" height="28" rx="5" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="370" y="290" font-size="11" fill="#475569" text-anchor="middle">HBM (显存) 16 GB | ~1.5 TB/s — 最大但最慢</text>

  <!-- 连接线 -->
  <line x1="370" y1="120" x2="370" y2="105" stroke="#3B82F6" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="370" y1="148" x2="370" y2="170" stroke="#F59E0B" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="370" y1="198" x2="370" y2="220" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="370" y1="248" x2="370" y2="272" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Pyramide -->
  <polygon points="370,65 720,290 20,290" fill="none" stroke="#CBD5E0" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- 容量/速度标注 -->
  <text x="690" y="95" font-size="10" fill="#3B82F6" text-anchor="end">容量: 小 (~20 MB)</text>
  <text x="690" y="110" font-size="10" fill="#3B82F6" text-anchor="end">速度: 最快 (40 TB/s)</text>

  <text x="35" y="258" font-size="10" fill="#9CA3AF">容量: 大 (16 GB)</text>
  <text x="35" y="273" font-size="10" fill="#9CA3AF">速度: 最慢 (1.5 TB/s)</text>

  <!-- 右上角说明 -->
  <text x="32" y="70" font-size="13" font-weight="700" fill="#2D3748">内存层级</text>
  <text x="32" y="90" font-size="11" fill="#718096">越靠近计算单元 (CUDA Core)</text>
  <text x="32" y="107" font-size="11" fill="#718096">带宽越大，容量越小</text>

  <!-- 底部总结 -->
  <text x="370" y="330" font-size="11" fill="#4A5568" text-anchor="middle">
    Flash Attention 核心思想: 将 QK^T·Softmax·V 计算从 HBM 移入 SRAM (L1/SMEM)，避免 O(L²) 矩阵在慢速 HBM 上读写
  </text>
</svg>
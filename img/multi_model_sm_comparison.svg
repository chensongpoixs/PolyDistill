<svg viewBox="0 0 780 380" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">
  <title>Qwen3 家族多规格 SM 利用率对比</title>
  <!-- 计算量柱状图 (左) -->
  <text x="180" y="24" font-size="13" font-weight="700" fill="#2D3748" text-anchor="middle">每步计算量 (TFLOPs)</text>

  <!-- 网格 -->
  <line x1="60" y1="40" x2="60" y2="280" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="60" y1="280" x2="300" y2="280" stroke="#9CA3AF" stroke-width="1"/>
  <g font-size="9" fill="#718096" text-anchor="end">
    <text x="55" y="284">0</text>
    <text x="55" y="224">6</text>
    <text x="55" y="164">12</text>
    <text x="55" y="104">18</text>
    <text x="55" y="44">30</text>
  </g>
  <g stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="4,3">
    <line x1="62" y1="220" x2="300" y2="220"/><line x1="62" y1="160" x2="300" y2="160"/>
    <line x1="62" y1="100" x2="300" y2="100"/><line x1="62" y1="40" x2="300" y2="40"/>
  </g>

  <!-- 计算量柱 -->
  <rect x="80" y="269" width="35" height="11" rx="2" fill="#93C5FD"/>
  <text x="97" y="264" font-size="9" fill="#3B82F6" text-anchor="middle">1.3</text>
  <text x="97" y="295" font-size="10" fill="#2D3748" text-anchor="middle">0.6B</text>

  <rect x="140" y="239" width="35" height="41" rx="2" fill="#60A5FA"/>
  <text x="157" y="234" font-size="9" fill="#2563EB" text-anchor="middle">4.7</text>
  <text x="157" y="295" font-size="10" fill="#2D3748" text-anchor="middle">1.7B</text>

  <rect x="200" y="183" width="35" height="97" rx="2" fill="#3B82F6"/>
  <text x="217" y="178" font-size="9" fill="#1D4ED8" text-anchor="middle">11.6</text>
  <text x="217" y="295" font-size="10" fill="#2D3748" text-anchor="middle">4B</text>

  <rect x="260" y="65" width="35" height="215" rx="2" fill="#1D4ED8"/>
  <text x="277" y="60" font-size="9" fill="#1E3A8A" text-anchor="middle">26.9</text>
  <text x="277" y="295" font-size="10" fill="#2D3748" text-anchor="middle">8B</text>

  <!-- ===== 右侧: 计算占比 ===== -->
  <text x="540" y="24" font-size="13" font-weight="700" fill="#2D3748" text-anchor="middle">GPU 纯计算占比</text>

  <!-- 饼图 -->
  <g transform="translate(430, 160)">
    <!-- 0.6B -->
    <circle cx="0" cy="-50" r="40" fill="none" stroke="#E2E8F0" stroke-width="28"/>
    <circle cx="0" cy="-50" r="40" fill="none" stroke="#FCA5A5" stroke-width="28"
            stroke-dasharray="1.75 173.7" stroke-dashoffset="0" transform="rotate(-90)"/>
    <text x="0" y="-46" font-size="10" font-weight="700" fill="#991B1B" text-anchor="middle">1.4%</text>
    <text x="55" y="-48" font-size="10" fill="#2D3748">0.6B</text>

    <!-- 1.7B -->
    <circle cx="0" cy="50" r="40" fill="none" stroke="#E2E8F0" stroke-width="28"/>
    <circle cx="0" cy="50" r="40" fill="none" stroke="#FBBF24" stroke-width="28"
            stroke-dasharray="9.5 165.8" stroke-dashoffset="0" transform="rotate(-90)"/>
    <text x="0" y="54" font-size="10" font-weight="700" fill="#92400E" text-anchor="middle">7.6%</text>
    <text x="55" y="52" font-size="10" fill="#2D3748">1.7B</text>
  </g>
  <!-- 4B 与 8B -->
  <g transform="translate(580, 110)">
    <circle cx="0" cy="0" r="40" fill="none" stroke="#E2E8F0" stroke-width="28"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#34D399" stroke-width="28"
            stroke-dasharray="32.5 142.7" stroke-dashoffset="0" transform="rotate(-90)"/>
    <text x="0" y="4" font-size="10" font-weight="700" fill="#047857" text-anchor="middle">25.9%</text>
    <text x="55" y="2" font-size="10" fill="#2D3748">4B</text>
  </g>
  <g transform="translate(580, 210)">
    <circle cx="0" cy="0" r="40" fill="none" stroke="#E2E8F0" stroke-width="28"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#10B981" stroke-width="28"
            stroke-dasharray="86.2 89.0" stroke-dashoffset="0" transform="rotate(-90)"/>
    <text x="0" y="4" font-size="10" font-weight="700" fill="#064E3B" text-anchor="middle">68.6%</text>
    <text x="55" y="2" font-size="10" fill="#2D3748">8B</text>
  </g>

  <!-- 底部分类 -->
  <rect x="60" y="318" width="60" height="22" rx="4" fill="#FEE2E2"/>
  <text x="90" y="333" font-size="10" fill="#991B1B" text-anchor="middle">I/O 密集</text>
  <rect x="135" y="318" width="60" height="22" rx="4" fill="#FEF3C7"/>
  <text x="165" y="333" font-size="10" fill="#92400E" text-anchor="middle">I/O 密集</text>
  <rect x="210" y="318" width="60" height="22" rx="4" fill="#D1FAE5"/>
  <text x="240" y="333" font-size="10" fill="#047857" text-anchor="middle">过渡区</text>
  <rect x="285" y="318" width="60" height="22" rx="4" fill="#A7F3D0"/>
  <text x="315" y="333" font-size="10" fill="#064E3B" text-anchor="middle">计算密集</text>

  <text x="390" y="333" font-size="11" fill="#718096" text-anchor="middle">
    ← 瓶颈: CPU-GPU 通信 ······ 瓶颈: GPU 算力 →
  </text>

  <text x="390" y="365" font-size="11" fill="#4A5568" text-anchor="middle">
    结论: 模型越大, GPU 纯计算占比越高; 8B 模型计算占比 ~69%, 进入计算密集型
  </text>
</svg>
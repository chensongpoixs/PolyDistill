<svg viewBox="0 0 740 360" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">
  <title>GPU 功耗与 SM 频率关系曲线</title>
  <defs>
    <linearGradient id="tzone" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#F59E0B" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <!-- 图表区域 -->
  <rect x="60" y="20" width="620" height="240" fill="url(#tzone)"/>

  <!-- Y轴 -->
  <line x1="60" y1="20" x2="60" y2="260" stroke="#9CA3AF" stroke-width="1"/>
  <g font-size="10" fill="#718096" text-anchor="end">
    <text x="55" y="24">360W</text><text x="55" y="84">250W</text>
    <text x="55" y="144">150W</text><text x="55" y="204">60W</text>
    <text x="55" y="264">0W</text>
  </g>

  <!-- X轴 -->
  <line x1="60" y1="260" x2="680" y2="260" stroke="#9CA3AF" stroke-width="1"/>
  <g font-size="10" fill="#718096" text-anchor="middle">
    <text x="160" y="278">1000</text><text x="280" y="278">1800</text>
    <text x="400" y="278">2300</text><text x="520" y="278">2700</text><text x="640" y="278">3000</text>
  </g>
  <text x="370" y="295" font-size="10" fill="#718096" text-anchor="middle">GPU 核心频率 (MHz)</text>

  <!-- 安全区/甜点区/危险区 标签 -->
  <text x="140" y="40" font-size="11" fill="#10B981" text-anchor="middle">稳定区</text>
  <text x="370" y="30" font-size="11" fill="#F59E0B" text-anchor="middle">甜点区 (推荐)</text>
  <text x="600" y="30" font-size="11" fill="#EF4444" text-anchor="middle">危险区 (TDP)</text>

  <!-- TDP 上限虚线 -->
  <line x1="60" y1="35" x2="680" y2="35" stroke="#EF4444" stroke-width="0.8" stroke-dasharray="6,3"/>
  <text x="670" y="30" font-size="9" fill="#EF4444" text-anchor="end">TDP 360W</text>

  <!-- 功率曲线 (二次曲线) -->
  <path d="M62,255 C180,240 260,190 340,140 C420,90 500,60 580,45 C640,38 670,33 678,28"
        fill="none" stroke="#6366F1" stroke-width="3" stroke-linecap="round"/>

  <!-- 曲线标注点 -->
  <circle cx="120" cy="240" r="5" fill="#10B981" stroke="white" stroke-width="2"/>
  <text x="120" y="232" font-size="9" fill="#10B981" text-anchor="middle">60W</text>

  <circle cx="280" cy="165" r="5" fill="#10B981" stroke="white" stroke-width="2"/>
  <text x="280" y="157" font-size="9" fill="#10B981" text-anchor="middle">150W</text>

  <circle cx="400" cy="110" r="5" fill="#F59E0B" stroke="white" stroke-width="2"/>
  <text x="400" y="102" font-size="9" fill="#F59E0B" text-anchor="middle">250W (甜点)</text>

  <circle cx="540" cy="62" r="5" fill="#F59E0B" stroke="white" stroke-width="2"/>
  <text x="540" y="54" font-size="9" fill="#F59E0B" text-anchor="middle">320W</text>

  <circle cx="650" cy="38" r="5" fill="#EF4444" stroke="white" stroke-width="2"/>
  <text x="650" y="30" font-size="9" fill="#EF4444" text-anchor="middle">360W (throttle!)</text>

  <!-- 调节建议箭头 -->
  <rect x="70" y="305" width="600" height="42" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="90" y="320" font-size="11" fill="#1D4ED8">关键策略:</text>
  <text x="90" y="338" font-size="11" fill="#4A5568">
    锁定频率 2000-2300MHz + 功耗上限 250W = 稳定甜点，避免 TDP throttling 导致训练速度波动
  </text>
</svg>
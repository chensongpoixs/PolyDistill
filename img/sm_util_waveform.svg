<svg viewBox="0 0 740 260" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">
  <title>SM 利用率锯齿波形: 5%-69% 震荡</title>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#F3F4F6" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect x="60" y="20" width="650" height="200" fill="url(#grid)"/>

  <!-- Y轴 -->
  <line x1="60" y1="20" x2="60" y2="220" stroke="#9CA3AF" stroke-width="1"/>
  <g font-size="10" fill="#718096" text-anchor="end">
    <text x="55" y="24">100%</text>
    <text x="55" y="64">80%</text>
    <text x="55" y="104">60%</text>
    <text x="55" y="144">40%</text>
    <text x="55" y="184">20%</text>
    <text x="55" y="224">0%</text>
  </g>

  <!-- SM理论上限虚线 -->
  <line x1="60" y1="30" x2="710" y2="30" stroke="#9CA3AF" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="670" y="24" font-size="9" fill="#9CA3AF" text-anchor="end">SM 理论上限 (100%)</text>

  <!-- FFN波峰区域标注 -->
  <rect x="200" y="50" width="90" height="50" fill="#38A169" opacity="0.12" rx="2"/>
  <rect x="480" y="50" width="90" height="50" fill="#38A169" opacity="0.12" rx="2"/>
  <text x="245" y="45" font-size="9" fill="#38A169" text-anchor="middle">FFN 波峰</text>
  <text x="525" y="45" font-size="9" fill="#38A169" text-anchor="middle">FFN 波峰</text>

  <!-- Attention波谷区域标注 -->
  <rect x="140" y="140" width="55" height="50" fill="#E53E3E" opacity="0.08" rx="2"/>
  <rect x="350" y="140" width="55" height="50" fill="#E53E3E" opacity="0.08" rx="2"/>
  <rect x="580" y="140" width="55" height="50" fill="#E53E3E" opacity="0.08" rx="2"/>
  <text x="167" y="125" font-size="8" fill="#E53E3E" text-anchor="middle">Attn</text>
  <text x="377" y="125" font-size="8" fill="#E53E3E" text-anchor="middle">Attn</text>
  <text x="607" y="125" font-size="8" fill="#E53E3E" text-anchor="middle">Attn</text>

  <!-- 锯齿波形曲线 -->
  <path d="M62,180 L80,180 L90,65 L160,65 L170,175 L185,175 L200,55 L270,55 L280,175 L295,175
           L310,60 L380,60 L390,175 L405,175 L420,55 L490,55 L500,175 L515,175
           L530,60 L600,60 L610,175 L625,175 L635,65 L700,65 L708,180"
        fill="none" stroke="#6366F1" stroke-width="2" stroke-linejoin="round"/>

  <!-- 图例 -->
  <line x1="380" y1="90" x2="400" y2="90" stroke="#6366F1" stroke-width="2"/>
  <text x="406" y="94" font-size="11" fill="#6366F1">SM 利用率实时波形</text>

  <!-- 波峰标注 -->
  <line x1="240" y1="55" x2="240" y2="42" stroke="#38A169" stroke-width="0.8"/>
  <text x="240" y="39" font-size="8" fill="#38A169" text-anchor="middle">~69%</text>

  <!-- 波谷标注 -->
  <line x1="167" y1="175" x2="167" y2="193" stroke="#E53E3E" stroke-width="0.8"/>
  <text x="167" y="204" font-size="8" fill="#E53E3E" text-anchor="middle">~5%</text>

  <!-- 底部说明 -->
  <text x="370" y="250" font-size="11" fill="#718096" text-anchor="middle">
    锯齿成因: FFN 大矩阵乘法产生波峰 → Attention 稀疏 thread block 产生波谷 → GC 断点加重低谷
  </text>
</svg>
<svg width="1000" height="700" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1000" height="700" fill="white" stroke="none"/>
  
  <!-- 标题 -->
  <text x="500" y="40" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">
    知识蒸馏 (Knowledge Distillation) 原理
  </text>
  <text x="500" y="70" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" text-anchor="middle" fill="#666">
    教师模型指导学生模型学习，让小模型也能学大模型的"味道"
  </text>
  
  <!-- 教师模型区域 -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="400" height="200" fill="#e3f2fd" stroke="#2196f3" stroke-width="2" rx="8"/>
    <text x="200" y="30" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2196f3">
      教师模型 (Teacher Model)
    </text>
    <text x="200" y="50" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      GPT-4 / Qwen2.5-72B (大模型)
    </text>
    
    <!-- 模型结构 -->
    <rect x="50" y="70" width="300" height="100" fill="#bbdefb" opacity="0.5" rx="4"/>
    <text x="200" y="100" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="10" text-anchor="middle" fill="#1976d2">
      80层 Transformer
    </text>
    <text x="200" y="120" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="10" text-anchor="middle" fill="#1976d2">
      720亿参数
    </text>
    
    <!-- 输出 -->
    <text x="200" y="180" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" text-anchor="middle" fill="#2196f3">
      Soft Targets (带温度的概率分布)
    </text>
  </g>
  
  <!-- 蒸馏箭头 -->
  <path d="M450,200 L550,200" stroke="#ff9800" stroke-width="4" marker-end="url(#arrow1)" stroke-dasharray="10,5"/>
  <text x="500" y="190" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" text-anchor="middle" fill="#ff9800">
    蒸馏过程
  </text>
  
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9800"/>
    </marker>
  </defs>
  
  <!-- 学生模型区域 -->
  <g transform="translate(550, 100)">
    <rect x="0" y="0" width="400" height="200" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" rx="8"/>
    <text x="200" y="30" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#4caf50">
      学生模型 (Student Model)
    </text>
    <text x="200" y="50" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      Qwen2.5-0.5B (小模型)
    </text>
    
    <!-- 模型结构 -->
    <rect x="50" y="70" width="300" height="100" fill="#c8e6c9" opacity="0.5" rx="4"/>
    <text x="200" y="100" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="10" text-anchor="middle" fill="#388e3c">
      24层 Transformer
    </text>
    <text x="200" y="120" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="10" text-anchor="middle" fill="#388e3c">
      5亿参数
    </text>
    
    <!-- 输出 -->
    <text x="200" y="180" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" text-anchor="middle" fill="#4caf50">
      Soft Targets + Hard Labels
    </text>
  </g>
  
  <!-- 损失函数 -->
  <g transform="translate(300, 350)">
    <rect x="0" y="0" width="400" height="100" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="200" y="25" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#ff9800">
      蒸馏损失函数
    </text>
    <text x="200" y="55" font-family="Consolas, 'Courier New', monospace" font-size="14" text-anchor="middle" fill="#333">
      L = α × L_hard + (1-α) × L_soft
    </text>
    <text x="200" y="75" font-family="Consolas, 'Courier New', monospace" font-size="12" text-anchor="middle" fill="#666">
      L_hard = CrossEntropy(学生, 真实标签)
    </text>
    <text x="200" y="90" font-family="Consolas, 'Courier New', monospace" font-size="12" text-anchor="middle" fill="#666">
      L_soft = KL散度(教师温度输出, 学生温度输出)
    </text>
  </g>
  
  <!-- 温度参数说明 -->
  <g transform="translate(100, 500)">
    <rect x="0" y="0" width="800" height="120" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="8"/>
    <text x="400" y="25" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#9c27b0">
      温度参数 T 的作用
    </text>
    
    <!-- 教师输出比较 -->
    <text x="100" y="50" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" font-weight="bold" fill="#333">
      教师模型输出 (T=3):
    </text>
    <text x="250" y="50" font-family="Consolas, 'Courier New', monospace" font-size="11" fill="#333">
      [0.65, 0.20, 0.10, 0.03, 0.02]
    </text>
    <text x="380" y="50" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="10" fill="#666">
      (显示类别间细微差别)
    </text>
    
    <!-- 普通输出比较 -->
    <text x="100" y="75" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" font-weight="bold" fill="#333">
      教师模型输出 (T=1):
    </text>
    <text x="250" y="75" font-family="Consolas, 'Courier New', monospace" font-size="11" fill="#333">
      [0.99, 0.005, 0.003, 0.001, 0.001]
    </text>
    <text x="380" y="75" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="10" fill="#666">
      (只有一个类别高概率)
    </text>
    
    <!-- 说明 -->
    <text x="400" y="100" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="10" text-anchor="middle" fill="#666">
      温度T越高，概率分布越平滑，学生模型能学到更多"暗知识"
    </text>
  </g>
  
  <!-- 效果对比 -->
  <g transform="translate(100, 650)">
    <text x="0" y="0" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" font-weight="bold" fill="#333">
      蒸馏效果:
    </text>
    <text x="100" y="0" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#4caf50">
      ✓ 学生模型准确率提升 5-10%
    </text>
    <text x="100" y="20" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#4caf50">
      ✓ 推理速度提升 2-5倍
    </text>
    <text x="100" y="40" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#4caf50">
      ✓ 模型体积减小 10-100倍
    </text>
  </g>
  
  <!-- 流程箭头连接 -->
  <path d="M750,300 L750,350" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrow2)"/>
  <defs>
    <marker id="arrow2" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9c27b0"/>
    </marker>
  </defs>
</svg>